<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>About | My Blog</title>
    <meta name="description" content="A Hugo blog managed from an Obsidian vault.">
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --paper: #fffdf8;
        --ink: #1f1f1c;
        --muted: #5f5b53;
        --line: #d9d1c3;
        --accent: #8a4b2a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background:
          radial-gradient(circle at top, #efe5d3 0%, #f5f1e8 40%, #f5f1e8 100%);
        color: var(--ink);
      }

      .wrap {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
      }

      header {
        padding: 40px 0 24px;
        border-bottom: 1px solid var(--line);
      }

      header a {
        color: inherit;
        text-decoration: none;
      }

      .brand {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .tagline {
        margin-top: 8px;
        color: var(--muted);
      }

      main {
        padding: 28px 0 64px;
      }

      .card {
        background: var(--paper);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(53, 42, 23, 0.05);
      }

      .list {
        display: grid;
        gap: 16px;
      }

      article h2,
      article h1 {
        margin-top: 0;
      }

      article a {
        color: var(--accent);
      }

      .meta {
        color: var(--muted);
        font-size: 0.95rem;
      }

      footer {
        padding: 24px 0 48px;
        color: var(--muted);
        border-top: 1px solid var(--line);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header>
        <a href="../../">
          <div class="brand">My Blog</div>
        </a>
        <div class="tagline">A Hugo blog managed from an Obsidian vault.</div>
      </header>

      <main>
        
  <article class="card">
    <h1>About</h1>
    <div class="meta">2026-04-11</div>
    <div><h1 id="about">About</h1>
<p>这是一个示例单页。</p>
<p>单页和文章的区别是：它更适合承载站点级内容，例如 About、Links、Now，而不是按时间归档的博客文章。</p>
<p>这类文件建议统一放在 <code>blog/content/pages/</code>。</p>
</div>
  </article>

      </main>

      <footer>
        Built with Hugo. Content managed from Obsidian.
      </footer>
    </div>
  </body>
</html>
